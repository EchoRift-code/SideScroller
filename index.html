<!-- Ctrl + Shift + I in browser to pull up console to see bugs -->
<!-- This file defines the canvases name and dimensions
 It then calls main.js file to get the javascript code-->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="icon" href="data:,">
        <title>Side Scroller</title> <!-- Title of the browser page-->
        <!-- Set up to allow GoatCounter to track game-->
        <script data-goatcounter="https://echo-rift.goatcounter.com/count" 
            src="//gc.zgo.at/count.js"></script>

        <style> /* Styles the entire page.*/
            html, body{ /* html, body = apply the style to both html and body. Helpful incase a browser has its own default values*/
                background-color: greenyellow; /*Alternate is #222*/
                margin: 0; /*Remove default browser spacing*/

                color: rgb(33, 36, 236); /* Default text color if one isnt established inside h1,h2, etc*/
                font-family: Arial, sans-serif; /* Font style */

                padding: 0;
                overflow: auto; /* Hides the scrollbar */

                display: flex; /* Enables the flexbox layout */
                flex-direction: column; /* Stacks item vertically*/

                justify-content: center; /*Center canvas horizontally*/
                align-items: center; /*Center canvas vertically*/

                height: 100vh; /*full viewport height*/
            }
            h1{/* Styles the text above the canvas*/
                margin-top: 20px; /* Space from the top of the page*/
            }
            h2{
                margin: 5px;
            }
            /* Container for buttons */
            .controls {
                position: absolute;
                bottom: 2vh;    /* Slightly up from the bottom */
                left: 0;
                width: 100%;    /* Stretch across the whole screen */
                display: flex;
                justify-content: space-between; /* Pushes buttons to the edges */
                padding: 0 5vw; /* Adds a little gap from the left and right edges */
                box-sizing: border-box; 
                pointer-events: none; /* Allows clicks to "pass through" the empty space to the canvas */
            }

            /* Update buttons to use viewport width (vw) for better mobile scaling */
            .controls button {
                /* Use clamp() to set a range: min size, preferred size, max size */
                width: clamp(60px, 20vw, 100px); 
                height: clamp(50px, 15vw, 80px);
                font-size: clamp(20px, 8vw, 40px);
                
                border-radius: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
                opacity: 0.6;
                touch-action: none;
                user-select: none;
                -webkit-user-select: none;
                pointer-events: auto;
            }

            /* Style all buttons globally */
            button {
                padding: 10px 20px; /* Size of the button */
                font-size: 16px; /* Text size*/

                background-color: #444; /* Dark grey background*/
                color: white; /* Text color */
                border: none; /* Removes default border */

                border-radius: 6px; /* Rounds the corners of the button, higher value more round */
                cursor: pointer; /* Shows pointer on hover, changes the mouse curser*/
            }

            /* When the button is pressed */
            button:active{
                background-color: #666; /* Changes the background color of the button to light grey*/
            }
            
            /* Update your canvas to allow it to grow and fill space */
            canvas {
                max-width: 100%;
                /* Remove max-height: 80vh to let it fill available space */
                width: 100%;
                height: auto; 
                flex-grow: 1; /* Allows the canvas to expand into available space */
                display: block;
                border: 2px solid black;
                object-fit: contain;
                image-rendering: pixelated;
                /* Added to prevent the canvas from overflowing the container */
                max-height: 100%; 
            }
            </style>
    </head>
    <body>
        <h1>Welcome</h1> <!-- This puts the text above the canvas -->
        <canvas id="gameCanvas" width="640" height="640"></canvas> <!-- Game Canvas -->
        
        <!-- Button container, holds the controls-->
        <div class="controls"
            style="display: none;"> <!-- Buttons will stay hidden until it senses a touchscreen, check main.js-->
            
            <!-- Displays a single button with the words 'Jump' in it-->
            <!-- window + . opens emoji picker-->
            <button id="leftBtn">←</button>
            <button id="jumpBtn">↑</button> 
            <button id="rightBtn">→</button>
        </div>

        <script type="module" src="main.js"></script> <!-- Loads the game code from the given file -->
    </body>
</html>
