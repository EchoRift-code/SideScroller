<!-- Ctrl + Shift + I in browser to pull up console to see bugs -->
<!-- This file defines the canvases name and dimensions
 It then calls main.js file to get the javascript code-->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Side Scroller</title> <!-- Title of the browser page-->
        <style> /* Styles the entire page.*/
            html, body{ /* html, body = apply the style to both html and body. Helpful incase a browser has its own default values*/
                background-color: greenyellow; /*Alternate is #222*/
                margin: 0; /*Remove default browser spacing*/

                color: rgb(33, 36, 236); /* Default text color if one isnt established inside h1,h2, etc*/
                font-family: Arial, sans-serif; /* Font style */

                padding: 0;
                overflow: hidden; /* Hides the scrollbar */

                display: flex; /* Enables the flexbox layout */
                flex-direction: column; /* Stacks item vertically*/

                justify-content: center; /*Center canvas horizontally*/
                align-items: center; /*Center canvas vertically*/

                height: 100vh; /*full viewport height*/
            }
            h1{/* Styles the text above the canvas*/
                margin-top: 20px; /* Space from the top of the page*/
            }
            /* Container for buttons */
            .controls{
                margin-top: 20px; /* Space betweeen canvas and button*/
                display: flex; /* Arranges the buttons in a row*/
                
                justify-content: space-around; /* space between buttons*/
                align-items: center; /* Vertically center */

                gap: 20px; /* optional, extra space between buttons*/
                position: absolute; /* keep the buttons on top of the canvas*/
                bottom: 20px; /* distance from the bottom */
                left: 50%; /* distance from the left side of the screen */
                transform: translateX(-50%); /* center horizontally */
            }

            /* This will only change the size of the buttons in this container*/
            .controls button{
                width: 100px;
                height: 60px;
                font-size: 40px;
                border-radius: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
                
            }

            /* Style all buttons globally */
            button {
                padding: 10px 20px; /* Size of the button */
                font-size: 16px; /* Text size*/

                background-color: #444; /* Dark grey background*/
                color: white; /* Text color */
                border: none; /* Removes default border */

                border-radius: 6px; /* Rounds the corners of the button, higher value more round */
                cursor: pointer; /* Shows pointer on hover, changes the mouse curser*/
            }

            /* When the button is pressed */
            button:active{
                background-color: #666; /* Changes the background color of the button to light grey*/
            }
            
            canvas{/* Styles the game canvas*/
                display: block; /*Remove inline spacing around canvas*/
                border: 2px solid black; /*Optional border*/
            }
            </style>
    </head>
    <body>
        <h1>Hello my trusted game tester.</h1> <!-- This puts the text above the canvas -->
        <h2>I hope you have fun! (No feedback wanted XD)</h2>
        <canvas id="gameCanvas" width="800" height="600"></canvas> <!-- Game Canvas -->
        
        <!-- Button container, holds the controls-->
        <div class="controls"
            style="display: none;"> <!-- Buttons will stay hidden until it senses a touchscreen, check main.js-->
            
            <!-- Displays a single button with the words 'Jump' in it-->
            <!-- window + . opens emoji picker-->
            <button id="leftBtn">⬅️</button>
            <button id="jumpBtn">⬆️</button> 
            <button id="rightBtn">➡️</button>
        </div>

        <script type="module" src="main.js"></script> <!-- Loads the game code from the given file -->
    </body>
</html>
